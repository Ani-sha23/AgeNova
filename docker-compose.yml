services:
  api:
    build:
      context: ./backend
    environment:
      AGENOVA_ENV: docker
      AGENOVA_LLM_PROVIDER: mock
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agenova-password
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - neo4j

  dashboard:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/agenova-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  qdrant_storage:
  neo4j_data:
